version: '3.8'

# =============================================================================
# NexusFlow Microservices Architecture
# =============================================================================
# Client ──[HTTP]──> Nginx ──[HTTP]──> NestJS Gateway ──[gRPC]──> Microservices
#                    │                      │
#                    ├─ Rate Limit          ├─ Auth (JWT)
#                    ├─ DDoS Protection     ├─ Route Logic
#                    ├─ SSL Termination     ├─ Data Aggregation
#                    └─ Security Headers    └─ gRPC Client
# =============================================================================

services:
  # ===========================================================================
  nginx:
    image: nginx:alpine
    container_name: nexusflow-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      nestjs-gateway:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    networks:
      - nexusflow-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
  nestjs-gateway:
    build:
      context: .
      dockerfile: apps/nestjs-gateway/Dockerfile
    container_name: nexusflow-nestjs-gateway
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - IDENTITY_SERVICE_URL=identity-service:5001
      - PROJECT_SERVICE_URL=http://project-service:3000
      - JWT_SECRET=super-secret-key-change-in-production
    depends_on:
      identity-service:
        condition: service_healthy
      project-service:
        condition: service_healthy
    networks:
      - nexusflow-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  redis:
    image: redis:7-alpine
    container_name: nexusflow-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - nexusflow-network
  identity-service:
    build:
      context: .
      dockerfile: apps/identity-service/Dockerfile
    container_name: nexusflow-identity
    expose:
      - "5001"
    environment:
      - NODE_ENV=production
    networks:
      - nexusflow-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('net').createConnection(5001, 'localhost').on('error', () => process.exit(1)).on('connect', () => process.exit(0))"]
      interval: 10s
      timeout: 5s
      retries: 5
  project-service:
    build:
      context: .
      dockerfile: apps/project-service/Dockerfile
    container_name: nexusflow-project
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - IDENTITY_SERVICE_URL=identity-service:5001
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
      identity-service:
        condition: service_healthy
    networks:
      - nexusflow-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
  notification-service:
    build:
      context: .
      dockerfile: apps/notification-service/Dockerfile
    container_name: nexusflow-notification
    # Exposed for WebSocket direct access
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - nexusflow-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/health"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  nexusflow-network:
    driver: bridge
