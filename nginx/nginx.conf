events {
    worker_connections 1024;
    multi_accept on;
}

http {
    upstream nestjs-gateway {
        server nestjs-gateway:4000;
        keepalive 32;
    }

    # Direct access to notification service (for real-time/WebSocket)
    upstream notification-service {
        server notification-service:3001;
        keepalive 32;
    }

    # -------------------------------------------------------------------------
    # LOGGING
    # -------------------------------------------------------------------------
    log_format gateway '$remote_addr - $remote_user [$time_local] '
                       '"$request" $status $body_bytes_sent '
                       '"$http_referer" "$http_user_agent" '
                       'rt=$request_time uct=$upstream_connect_time '
                       'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log gateway;
    error_log /var/log/nginx/error.log warn;

    # -------------------------------------------------------------------------
    # SECURITY HEADERS
    # -------------------------------------------------------------------------
    # Protect against common attacks
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # -------------------------------------------------------------------------
    # PERFORMANCE OPTIMIZATIONS
    # -------------------------------------------------------------------------
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml;

    # -------------------------------------------------------------------------
    # RATE LIMITING & DDoS PROTECTION
    # -------------------------------------------------------------------------

    # General API rate limit: 10 requests/second per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

    # Auth rate limit: 5 requests/second per IP (stricter for login/register)
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;

    # Connection limit: 20 concurrent connections per IP
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # -------------------------------------------------------------------------
    # SERVER BLOCK
    # -------------------------------------------------------------------------
    server {
        listen 80;
        server_name localhost;

        # Request size limit (protect against large payload attacks)
        client_max_body_size 10M;

        # -----------------------------------------------------------------
        # CORS Headers (applied to all locations via inheritance)
        # -----------------------------------------------------------------
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Requested-With' always;

        location /auth {
            # Handle CORS preflight
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Requested-With';
                add_header 'Access-Control-Max-Age' 86400;
                return 204;
            }

            limit_req zone=auth_limit burst=10 nodelay;
            limit_conn conn_limit 10;

            proxy_pass http://nestjs-gateway;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
        location /api {
            # Handle CORS preflight
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Requested-With';
                add_header 'Access-Control-Max-Age' 86400;
                return 204;
            }

            limit_req zone=api_limit burst=20 nodelay;
            limit_conn conn_limit 20;

            proxy_pass http://nestjs-gateway;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /api;

            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
        location /notifications {
            # Handle CORS preflight
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Requested-With';
                add_header 'Access-Control-Max-Age' 86400;
                return 204;
            }

            limit_req zone=api_limit burst=20 nodelay;
            limit_conn conn_limit 20;

            proxy_pass http://notification-service;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            proxy_http_version 1.1;
        }
        location = /health {
            access_log off;
            add_header Content-Type application/json;
            return 200 '{"status":"healthy","service":"nginx-gateway"}';
        }

        location /health/gateway {
            proxy_pass http://nestjs-gateway/health;
            proxy_connect_timeout 5s;
            proxy_read_timeout 5s;
        }

        location /health/notification {
            proxy_pass http://notification-service/health;
            proxy_connect_timeout 5s;
            proxy_read_timeout 5s;
        }

        location = / {
            default_type application/json;
            return 200 '{
  "service": "NexusFlow API Gateway",
  "version": "2.0.0",
  "architecture": "Nginx -> NestJS Gateway -> Microservices (gRPC)",
  "endpoints": {
    "auth": {
      "register": "POST /auth/register",
      "login": "POST /auth/login",
      "me": "GET /auth/me (JWT required)"
    },
    "tasks": {
      "list": "GET /api/tasks (JWT required)",
      "create": "POST /api/tasks (JWT required)",
      "get": "GET /api/tasks/:id (JWT required)",
      "update": "PUT /api/tasks/:id (JWT required)",
      "delete": "DELETE /api/tasks/:id (JWT required)"
    },
    "notifications": "/notifications",
    "health": {
      "nginx": "/health",
      "gateway": "/health/gateway",
      "notification": "/health/notification"
    }
  }
}';
        }
        error_page 404 = @not_found;
        location @not_found {
            default_type application/json;
            return 404 '{"error":"Not Found","message":"The requested endpoint does not exist","status":404}';
        }

        error_page 500 502 503 504 = @server_error;
        location @server_error {
            default_type application/json;
            return 502 '{"error":"Service Unavailable","message":"The upstream service is temporarily unavailable","status":502}';
        }

        error_page 429 = @rate_limit;
        location @rate_limit {
            default_type application/json;
            return 429 '{"error":"Too Many Requests","message":"Rate limit exceeded. Please slow down.","status":429}';
        }
    }
}
